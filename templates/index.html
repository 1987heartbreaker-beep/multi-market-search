<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フリマ・EC 相場チェッカー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Sans", Arial, sans-serif;
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,.10);
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      padding: 2rem 2rem 1.8rem;
      text-align: center;
      position: relative;
    }
    .card-header h1 {
      color: #fff;
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: .35rem;
    }
    .card-header p {
      color: rgba(255,255,255,.6);
      font-size: .8rem;
    }
    .search-area { padding: 1.8rem 1.8rem 0; }
    .input-wrap {
      display: flex;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }
    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      padding: .85rem 1.1rem;
      font-size: 16px; /* iPhoneでズームされないサイズ */
    }
    .open-all-wrap { padding: 1rem 1.8rem 0; }
    .btn-open-all {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: .78rem 1rem;
      font-size: .95rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e88e5, #1565c0);
      color: #fff;
      cursor: pointer;
    }
    .btn-open-all:disabled { opacity: .4; }
    .sites-grid {
      padding: 1.8rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: .75rem;
    }
    .site-btn {
      display: flex;
      align-items: center;
      gap: .65rem;
      border-radius: 11px;
      padding: .75rem 1rem;
      background: #f8f9fb;
      text-decoration: none;
      color: #1a1a2e;
    }
    .site-btn.disabled { opacity: .4; pointer-events: none; }
    .site-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .site-name { font-weight: 700; font-size: .88rem; }
    /* サイト別カラー */
    .site-mercari { border-left: 5px solid #ff0211; }
    .site-yahoo { border-left: 5px solid #ff0033; }
    .site-amazon { border-left: 5px solid #ff9900; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>🔍 相場一括チェッカー</h1>
    <p>キーワードを入力して3サイトを同時検索</p>
  </div>
  <div class="search-area">
    <div class="input-wrap">
      <input type="text" id="query" placeholder="商品名を入力" autocomplete="off" autofocus />
    </div>
  </div>
  <div class="open-all-wrap">
    <button class="btn-open-all" id="btn-open-all" onclick="openAll()" disabled>
      🚀 3サイトを一斉に開く
    </button>
  </div>
  <div class="sites-grid">
    <a class="site-btn site-mercari disabled" id="btn-mercari" href="#" target="_blank">
      <div class="site-icon">🛍️</div><div class="site-name">メルカリ</div>
    </a>
    <a class="site-btn site-yahoo disabled" id="btn-yahoo" href="#" target="_blank">
      <div class="site-icon">🔨</div><div class="site-name">ヤフオク</div>
    </a>
    <a class="site-btn site-amazon disabled" id="btn-amazon" href="#" target="_blank">
      <div class="site-icon">📦</div><div class="site-name">Amazon</div>
    </a>
  </div>
</div>

<script>
  const queryInput = document.getElementById("query");
  const btnOpenAll = document.getElementById("btn-open-all");
  const SITE_IDS = ["mercari", "yahoo", "amazon"];

  function buildUrls(q) {
    const enc = encodeURIComponent(q);
    return {
      mercari: `https://jp.mercari.com/search?keyword=${enc}&status=on_sale`,
      yahoo:   `https://auctions.yahoo.co.jp/search/search?p=${enc}&istatus=2`,
      amazon:  `https://www.amazon.co.jp/s?k=${enc}&rh=p_n_condition-type%3A2224238051`
    };
  }

  queryInput.addEventListener("input", () => {
    const q = queryInput.value.trim();
    const hasQuery = q.length > 0;
    btnOpenAll.disabled = !hasQuery;
    const urls = hasQuery ? buildUrls(q) : null;
    SITE_IDS.forEach(id => {
      const el = document.getElementById(`btn-${id}`);
      if (hasQuery) {
        el.href = urls[id];
        el.classList.remove("disabled");
      } else {
        el.href = "#";
        el.classList.add("disabled");
      }
    });
  });

  function openAll() {
    const q = queryInput.value.trim();
    if (!q) return;
    const urls = buildUrls(q);
    SITE_IDS.forEach(id => window.open(urls[id], `_market_${id}`));
  }
</script>
</body>
</html>
